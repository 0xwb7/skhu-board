openai:
  api-key: ${OPENAI_API_KEY}

lms:
  id: ${LMS_ID}
  password: ${LMS_PASSWORD}

app:
  web:
    allowed-origins: []
  api:
    rate-limit:
      enabled: true
      window-seconds: 60
      max-requests: 120
  crawl:
    schedule-enabled: false
    web-driver:
      browser-path: ${CHROME_BIN:}
    internal-api:
      enabled: false
      key: ${INTERNAL_API_KEY:}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
