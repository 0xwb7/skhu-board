app:
  api:
    rate-limit:
      enabled: true
      window-seconds: 60
      max-requests: 120
  crawl:
    schedule-enabled: true
    web-driver:
      browser-path: ${CHROME_BIN:/usr/bin/google-chrome}
    internal-api:
      enabled: false

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
